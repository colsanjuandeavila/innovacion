name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */3 * *'  # Cada 3 días a las 8am UTC
  workflow_dispatch:         # También permite ejecutarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://outhobesotwdfwdxcdpp.supabase.co/rest/v1/innovaciones?select=id&limit=1" \
            -H "apikey: sb_publishable_DepJt3f6TKkSru1qzpZUlA_zLtxtQvY" \
            -H "Authorization: Bearer sb_publishable_DepJt3f6TKkSru1qzpZUlA_zLtxtQvY"
          echo " - Ping completado"
